se_date":"2026-03-04"},{"id":"mercy","original_title":"Mercy","title":"Милосердие","overview":"Недалёкое будущее, уровень преступности, караемой смертной казнью, резко возрос. Детектива обвиняют в совершении тяжкого преступления, и он вынужден доказывать свою невиновность.","media_type":"movie","release_date":"2026-01-20"},{"id":"vanaveera","original_title":"Vanaveera","title":"Vanaveera","overview":"","media_type":"movie","release_date":"2026-02-13"},{"id":"eastenders","original_title":"EastEnders","title":"Жители Ист-Энда","overview":"Сериал о повседневной жизни простых жителей вымышленного округа Уолфорд в восточной части Лондона.","media_type":"tv","release_date":"1985-02-19"},{"id":"q","original_title":"オバケのQ太郎","title":"Привидение Кью-Таро","overview":"Обакэ — маленький и безобидный обакэ (демон), похожий внешне на утёнка, который любит летать, пугая прохожих людей, но сам страшно боится собак. Он начинает жить в семье Охара и дружится с мальчиком по имени Сёта, вместе они будут попадать в забавные ситуации и решать проблемы.","media_type":"tv","release_date":"1985-04-01"},{"id":"bones","original_title":"Bones","title":"Кости","overview":"Доктор Темперанс Бреннан, блестящий, но одинокий антрополог получает то, чего она меньше всего желала — напарника. Бюро посылает ей амбициозного агента ФБР Сили Бута, чтобы помочь в расследовании нераскрытых дел путем изучения и идентификации костей давно пропавших людей.\n\nНо давно умершие жертвы не единственное, с чем придется столкнуться Боунс, Буту и их команде, раскрывая преступления они часто сталкиваются с взяточничеством, коррупцией и местной разрозненностью.","media_type":"tv","release_date":"2005-09-13"},{"id":"the-simpsons","original_title":"The Simpsons","title":"Симпсоны","overview":"Семейство Симпсонов — папаша Гомер, мама Мардж, дочери Лиза и маленькая Мэгги, и несносный подросток Барт — проживают в среднестатистическом городке Спрингфилд. Гомер трудится на местной атомной станции, Мардж занимается домом и дет view":"В системе уголовного судопроизводства обвинение представляют две независимые, равные по значению инстанции — полиция, расследующая преступления, и прокурор, представляющий дело в суде.","media_type":"tv","release_date":"1990-09-13"},{"id":"law-order-special-victims-unit","original_title":"Law & Order: Special Victims Unit","title":"Закон и порядок. Специальный корпус","overview":"В системе судопроизводства преступления на сексуальной почве считаются особенно тяжкими. В Нью-Йорке подобные преступления расследуют детективы элитного подразделения, известного как Особый отдел. Это рассказ о них.","media_type":"tv","release_date":"1999-09-20"},{"id":"the-rookie","original_title":"The Rookie","title":"Новичок","overview":"Начинать с чистого листа всегда нелегко, особенно для уроженца маленького городка Джона Нолана, который после инцидента, перевернувшего его жизнь, решил воплотить в жизнь давнюю мечту и присоединиться к полиции Лос-Анджелеса. Возрастного новичка встречают с понятным скептицизмом, однако жизненный опыт, упорство и чувство юмора дают Джону преимущество.","media_type":"tv","release_date":"2018-10-16"},{"id":"movie","original_title":"霹靂布袋戲","title":"霹靂布袋戲","overview":"","media_type":"tv","release_date":"1988-06-01"},{"id":"family-guy","original_title":"Family Guy","title":"Гриффины","overview":"Типичная американская семья, члены которой способны разбить все возможные стереотипы. А говорящая собака с сигаретой и сухим мартини... А грудной малыш, мечтающий поработить весь мир... Разве это отклонение? Это катарсис в каждом эпизоде!","media_type":"tv","release_date":"1999-01-31"},{"id":"peaky-blinders","original_title":"Peaky Blinders","title":"Острые козырьки","overview":"Британский сериал о криминальном мире Бирмингема 20-х годов прошлого века, в котором многолюдная семья Шелби стала одной из самых жестоких и влиятельных гангстерских банд послевоенного времени. Фирменным знаком группировки, промышлявшей грабежами и азартными играми, стали зашитые в козырьки лезвия.","media_type":"tv","release_date":"2013-09-12"},{"id":"frasier","original_title":"Frasier","title":"Фрейзер","overview":"После развода известный бостонский психиатр Фрейзер Крэйн приезжает в родной Сиэтл, чтобы начать жизнь заново. Его отец Мартин, отставной полицейский, брат Нэйл и собака Эдди рады возвращению Фрейзера. Еще его ждет новая работа эфирного радио-психиатра, откликающегося на имя «Я Слушаю» и масса внештатных и комических ситуаций на работе и дома.","media_type":"tv","release_date":"1993-09-16"},{"id":"csi-crime-scene-investigation","original_title":"CSI: Crime Scene Investigation","title":"C.S.I. Место преступления","overview":"Лас-Вегас… Своими яркими неоновыми огнями, сотнями игровых клубов и казино он манит всё новых и новых людей. Но далеко не все из них оказываются добропорядочными гражданами. В огромном людском потоке частенько прячутся преступники всех мастей. Они убеждены, что их злодеяния останутся незамеченными. Но они сильно ошибаются, ведь в городе работает неутомимая команда полиции C.S.I. Когда следствие заходит в тупик, в игру вступает группа суперпрофессиональных криминалистов во главе с капитаном Гриссомом.","media_type":"tv","release_date":"2000-10-06"},{"id":"the-talk","original_title":"The Talk","title":"The Talk","overview":"","media_type":"tv","release_date":"2010-10-18"},{"id":"watch-what-happens-live-with-andy-cohen","original_title":"Watch What Happens Live with Andy Cohen","title":"Смотрите, что происходит: Прямой эфир","overview":"Исполнительный директор телеканала Bravo Энди Коэн обсуждает темы поп-культуры со знаменитостями и участниками реалити-шоу.","media_type":"tv","release_date":"2009-07-16"},{"id":"house","original_title":"House","title":"Доктор Хаус","overview":"Сериал рассказывает о команде врачей, которые должны правильно поставить диагноз пациенту и спасти его. Возглавляет команду доктор Грегори Хаус, который ходит с тростью после того, как его мышечный инфаркт в правой ноге слишком поздно правильно диагностировали. Как врач Хаус просто гений, но сам не отличается проникновенностью в общении с больными и с удовольствием избегает их, если только есть возможность. Он сам всё время проводит в борьбе с собственной болью, а трость в его руке только подчеркивает его жесткую, ядовитую манеру общения. Порой его поведение можно назвать почти бесчеловечным, и при этом он прекрасный врач, обладающий нетипичным умом и безупречным инстинктом, что снискало ему глубокое уважение. Будучи инфекционистом, он ещё и замечательный диагност, который любит разгадывать медицинские загадки, чтобы спасти кому-то жизнь. Если бы все было по его воле, то Хаус лечил бы больных не выходя из своего кабинета.","media_type":"tv","release_date":"2004-11-16"},{"id":"cheers","original_title":"Cheers","title":"Чирс","overview":"«Чирс» — это название небольшого бара в Бостоне, которым владеет Сэм «Мэйдэй» Мэлоун, бывшая звезда бейсбола. Сэм, персонал и завсегдатаи бара каждый день болтают о проблемах, смеются друг над другом, обсуждают забавные случаи из жизни. Все это, разумеется, сдобрено солидной порцией алкоголя. На шутках, юморе и дружелюбных подколках и строится весь сериал.","media_type":"tv","release_date":"1982-09-30"}],
